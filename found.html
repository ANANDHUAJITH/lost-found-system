<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Report Found Item</title>
<link rel="stylesheet" href="css/style.css">

<style>

body{
  font-family: Arial, sans-serif;
  background:#e9edf3;
  margin:0;
}

.form-container{
  max-width:900px;
  margin:60px auto;
  background:white;
  padding:40px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.form-container h1{
  color:#4CAF50;
}

.form-container p{
  color:#666;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:20px;
}

.form-group{
  display:flex;
  flex-direction:column;
}

.form-group label{
  margin-bottom:5px;
  font-weight:bold;
}

.form-group input{
  padding:12px;
  border:1px solid #ccc;
  border-radius:6px;
}

.full-width{
  grid-column:1 / 3;
}

.button-row{
  text-align:center;
  margin-top:30px;
}

.submit-btn{
  padding:15px 30px;
  background:#f7941d;
  border:none;
  color:white;
  font-size:18px;
  border-radius:30px;
  cursor:pointer;
  margin-right:15px;
}

.submit-btn:hover{
  background:#e57e00;
}

.back-btn{
  padding:15px 30px;
  background:#777;
  border:none;
  color:white;
  font-size:18px;
  border-radius:30px;
  cursor:pointer;
}

.back-btn:hover{
  background:#555;
}

</style>
</head>

<body>

<div class="form-container">

<h1>Report Found Item</h1>
<p>Enter the details of the item you found so the owner can locate it.</p>

<div class="form-grid">

<div class="form-group">
<label>Item Name *</label>
<input type="text" id="itemName">
</div>

<div class="form-group">
<label>Where did you find it? *</label>
<input type="text" id="foundPlace">
</div>

<div class="form-group">
<label>Description *</label>
<input type="text" id="itemDesc">
</div>

<div class="form-group">
<label>Date Found *</label>
<input type="date" id="foundDate">
</div>

<div class="form-group">
<label>Phone Number *</label>
<input type="tel" id="phone">
</div>

<div class="form-group">
<label>Upload Image</label>
<input type="file" id="itemImage" accept="image/*">
</div>

</div>

<div class="button-row">
<button class="submit-btn" onclick="submitFoundItem()">Submit</button>
<button class="back-btn" onclick="goBack()">Back</button>
</div>

</div>

<script src="js/found.js"></script>

</body>
</html>
