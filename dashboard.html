<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="navbar">
    <h1>Lost & Found Dashboard</h1>
  </header>

  <main class="hero">
    <h2 id="welcomeText"></h2>

    <button class="btn" id="reportLostBtn" onclick="goToLost()">Report Lost Item</button>
    <button class="btn" id="reportFoundBtn" onclick="goToFound()">Report Found Item</button>

    <button class="btn" onclick="viewLost()">View Lost Items</button>
    <button class="btn" onclick="viewFound()">View Found Items</button>

    <button class="btn" onclick="logout()">Logout</button>


  </main>

  <script src="js/dashboard.js"></script>
</body>
</html>
