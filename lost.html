<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Report Lost Item</title>
<link rel="stylesheet" href="css/style.css">

<style>

body{
  font-family: Arial, sans-serif;
  background:#e9edf3;
  margin:0;
}

.form-container{
  max-width:900px;
  margin:60px auto;
  background:white;
  padding:40px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.form-container h1{
  color:#4CAF50;
}

.form-container p{
  color:#666;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:20px;
}

.form-group{
  display:flex;
  flex-direction:column;
}

.form-group label{
  margin-bottom:5px;
  font-weight:bold;
}

.form-group input{
  padding:12px;
  border:1px solid #ccc;
  border-radius:6px;
}

.full-width{
  grid-column:1 / 3;
}

.submit-btn{
  padding:15px 30px;
  background:#f7941d;
  border:none;
  color:white;
  font-size:18px;
  border-radius:30px;
  cursor:pointer;
  margin-right:15px;
}

.submit-btn:hover{
  background:#e57e00;
}

.back-btn{
  padding:15px 30px;
  background:#777;
  border:none;
  color:white;
  font-size:18px;
  border-radius:30px;
  cursor:pointer;
}

.back-btn:hover{
  background:#555;
}
.button-row{
  text-align:center;
  margin-top:30px;
}


</style>
</head>

<body>



<div class="form-container">

<h1>Report Lost Item</h1>
<p>Enter the item details so others can help you find it.</p>

<form onsubmit="submitLostItem(); return false;">

<div class="form-grid">

<div class="form-group">
<label>Item Name *</label>
<input type="text" id="itemName" required>
</div>

<div class="form-group">
<label>Where did you lose it? *</label>
<input type="text" id="lostPlace" required>
</div>

<div class="form-group">
<label>Description *</label>
<input type="text" id="itemDesc" required>
</div>

<div class="form-group">
<label>Date Lost *</label>
<input type="date" id="lostDate" required>
</div>

<div class="form-group">
<label>Phone Number *</label>
<input type="tel" id="phone" required>
</div>

<div class="form-group">
<label>Upload Image</label>
<input type="file" id="itemImage">
</div>

</div>

<div class="button-row">
<button class="submit-btn">Submit </button>
<button class="back-btn" onclick="goBack()">Back</button>

</div>

</form>

</div>

<script src="js/lost.js"></script>

<script>
function goBack(){
  window.location.href = "intro.html";
}
</script>

</body>
</html>
